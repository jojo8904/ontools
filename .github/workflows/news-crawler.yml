name: News Crawler

on:
  schedule:
    # Run every 6 hours (0, 6, 12, 18 UTC) → KST 09:00, 15:00, 21:00, 03:00
    # 주의: GitHub은 60일간 저장소 활동이 없으면 schedule 트리거를 자동 비활성화함.
    # 이를 우회하기 위해 외부 스케줄러(cron-job.org)가 아래 repository_dispatch로 깨움.
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manual trigger
  repository_dispatch: # 외부 스케줄러 트리거 (자동 비활성화 영향 없음)
    types: [crawl-news]

jobs:
  crawl-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: npx tsx scripts/crawl-news.ts

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="⚠️ News crawler failed at $(date)"
          fi
