name: YouTube Video Crawler

on:
  schedule:
    # Run every Monday at 09:00 KST (00:00 UTC)
    # 주의: 60일 무활동 시 schedule 자동 비활성화 → 외부 스케줄러가 repository_dispatch로 백업 트리거.
    - cron: '0 0 * * 1'
  workflow_dispatch: # Manual trigger
  repository_dispatch: # 외부 스케줄러 트리거
    types: [crawl-youtube]

jobs:
  crawl-youtube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Crawl YouTube videos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npx tsx scripts/crawl-youtube.ts
